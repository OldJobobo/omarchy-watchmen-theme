    layout: radial_triptuch
    background: [radial, "#4e6aa0", "#242949"] # [style, color_a, color_b]; style = solid|vertical|diagonal|radial
    treatment: { bg: bg_dark, mid: mid_dark, fg: fg_neutral } # optional: { bg: treatment_key, mid: treatment_key, fg: treatment_key }
    shadow: hard # optional: soft|hard; falls back to script default/CLI flag when omitted
