treatments:
  bg_dark: { brightness: 0.85, saturation: 80 } # { brightness: 0.0-1.0, saturation: 0-100 }
  mid_dark: { brightness: 0.75, saturation: 70 } # reusable treatment map; reference by key from scene or slot
  fg_neutral: { brightness: 1.0, saturation: 100 } # same syntax as other treatment entries

