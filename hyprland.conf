#
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.i
$activeBorderColor = rgb(246d96) rgb(246d96) rgb(246d96) rgb(9287b0) rgb(9287b0) rgb(9287b0) 45deg 
$inactiveBorderColor = rgb(242949)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    border_size = 4
    gaps_in = 9
    gaps_out = 15
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
}

decoration {
    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(0f0a12cc)
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        noise = 0.02
    }
}

