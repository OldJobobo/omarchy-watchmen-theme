# Watchmen Theme for Omarchy
# Never Compromise. Not Even Your Desktop
#
#
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.i
$activeBorderColor = rgb(2488cb) rgb(2488cb) rgb(9287b0) rgb(9287b0) rgb(9287b0) 45deg 
$inactiveBorderColor = rgb(55595d)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    border_size = 3
    gaps_in = 8
    gaps_out = 16
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
}

decoration {
    rounding = 0
    active_opacity = 1.05
    inactive_opacity = 1.01
    shadow {
        enabled = true
        range = 0
        # render_power = 3
        sharp = true
        ignore_window = false
        color = rgba(000000dd)
        color_inactive = rgba(000000aa)
        offset = 6 6
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        noise = 0.01
    }
}

